<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1306 488" role="img" aria-labelledby="title desc">
  <title id="title">Sanitized n8n workflow preview</title>
  <desc id="desc">A dark-themed diagram of an n8n workflow with two triggers, a GitHub read step, an HTTP request, an edit fields step, and a GitHub write step.</desc>
  <defs>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2b2b2b" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666666" />
    </marker>
    <style>
      .card {
        fill: #262626;
        stroke: #3c3c3c;
        stroke-width: 1.5;
        filter: url(#shadow);
      }
      .title {
        fill: #ffffff;
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 16px;
        font-weight: 700;
      }
      .subtitle {
        fill: #a8a8a8;
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 12px;
      }
      .connector {
        fill: none;
        stroke: #575757;
        stroke-width: 3;
        stroke-linecap: round;
      }
      .port {
        fill: #2b2b2b;
        stroke: #5c5c5c;
        stroke-width: 1.5;
      }
      .accent {
        fill: #ff8c1a;
      }
      .icon-stroke {
        fill: none;
        stroke: #f5f5f5;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .icon-purple {
        fill: none;
        stroke: #8f8cff;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .icon-text {
        fill: #f5f5f5;
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 26px;
        font-weight: 700;
        text-anchor: middle;
      }
    </style>
  </defs>

  <rect width="1306" height="488" fill="#171717" />
  <rect width="1306" height="488" fill="url(#dots)" opacity="0.9" />

  <path class="connector" marker-end="url(#arrow)" d="M200 118 C255 118, 255 203, 340 203" />
  <path class="connector" d="M200 340 C255 340, 255 203, 340 203" />
  <path class="connector" marker-end="url(#arrow)" d="M448 203 L584 203" />
  <path class="connector" marker-end="url(#arrow)" d="M692 203 L830 203" />
  <path class="connector" marker-end="url(#arrow)" d="M938 203 L1076 203" />
  <path class="connector" d="M1184 203 L1248 203" />

  <g>
    <rect class="card" x="92" y="48" width="108" height="140" rx="18" />
    <circle class="port" cx="200" cy="118" r="8" />
    <path class="accent" d="M61 84 L66 74 L72 78 L67 88 Z" />
    <circle cx="146" cy="94" r="18" class="icon-stroke" />
    <path class="icon-stroke" d="M146 79 L146 95 L136 101" />
    <text class="title" x="146" y="174" text-anchor="middle">Schedule Trigger1</text>
  </g>

  <g>
    <rect class="card" x="92" y="258" width="108" height="140" rx="18" />
    <circle class="port" cx="200" cy="340" r="8" />
    <path class="accent" d="M61 306 L66 296 L72 300 L67 310 Z" />
    <circle cx="146" cy="304" r="18" class="icon-stroke" />
    <path class="icon-stroke" d="M136 304 A10 10 0 1 1 153 296" />
    <path class="icon-stroke" d="M146 304 L156 314" />
    <path class="icon-stroke" d="M152 318 L161 309" />
    <text class="title" x="146" y="378" text-anchor="middle">When clicking 'Execute</text>
    <text class="title" x="146" y="397" text-anchor="middle">workflow'</text>
  </g>

  <g>
    <rect class="card" x="340" y="133" width="108" height="140" rx="18" />
    <circle class="port" cx="340" cy="203" r="8" />
    <circle class="port" cx="448" cy="203" r="8" />
    <circle cx="394" cy="203" r="18" fill="#f5f5f5" />
    <text class="icon-text" x="394" y="211" fill="#171717">GH</text>
    <text class="title" x="394" y="247" text-anchor="middle">Get a file</text>
    <text class="subtitle" x="394" y="266" text-anchor="middle">get: file</text>
  </g>

  <g>
    <rect class="card" x="584" y="133" width="108" height="140" rx="18" />
    <circle class="port" cx="584" cy="203" r="8" />
    <circle class="port" cx="692" cy="203" r="8" />
    <circle cx="638" cy="203" r="18" class="icon-purple" />
    <path class="icon-purple" d="M620 203 H656" />
    <path class="icon-purple" d="M638 185 V221" />
    <path class="icon-purple" d="M626 191 C632 198, 632 208, 626 215" />
    <path class="icon-purple" d="M650 191 C644 198, 644 208, 650 215" />
    <text class="title" x="638" y="247" text-anchor="middle">HTTP Request</text>
    <text class="subtitle" x="638" y="266" text-anchor="middle">GET: https://cataas.com/cat/...</text>
  </g>

  <g>
    <rect class="card" x="830" y="133" width="108" height="140" rx="18" />
    <circle class="port" cx="830" cy="203" r="8" />
    <circle class="port" cx="938" cy="203" r="8" />
    <path class="icon-purple" d="M878 184 L892 170 L899 177 L885 191 Z" />
    <path class="icon-purple" d="M872 198 L883 195 L875 187 Z" />
    <rect x="871" y="178" width="24" height="24" rx="3" class="icon-purple" />
    <text class="title" x="884" y="247" text-anchor="middle">Edit Fields</text>
    <text class="subtitle" x="884" y="266" text-anchor="middle">manual</text>
  </g>

  <g>
    <rect class="card" x="1076" y="133" width="108" height="140" rx="18" />
    <circle class="port" cx="1076" cy="203" r="8" />
    <circle class="port" cx="1184" cy="203" r="8" />
    <circle cx="1130" cy="203" r="18" fill="#f5f5f5" />
    <text class="icon-text" x="1130" y="211" fill="#171717">GH</text>
    <text class="title" x="1130" y="247" text-anchor="middle">Edit a file</text>
    <text class="subtitle" x="1130" y="266" text-anchor="middle">edit: file</text>
  </g>

  <g>
    <rect x="1240" y="190" width="24" height="24" rx="6" fill="#2d2d2d" stroke="#444444" />
    <path d="M1246 202 H1258 M1252 196 V208" stroke="#d8d8d8" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
